<!DOCTYPE html>
<html lang="ar" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Agents R - Multi-Model UI Demo</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0a0a0a;
      color: #e5e5e5;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
    }

    .container {
      width: 100%;
      max-width: 900px;
      background: #111111;
      border-radius: 12px;
      border: 1px solid #2a2a2a;
      overflow: hidden;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
    }

    /* Header with Logo */
    .header {
      padding: 40px 24px;
      text-align: center;
      border-bottom: 1px solid #1a1a1a;
    }

    .logo {
      font-size: 48px;
      font-weight: 800;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 8px;
      letter-spacing: -1px;
    }

    .tagline {
      color: #666;
      font-size: 14px;
    }

    /* Main Content */
    .content {
      padding: 24px;
    }

    /* Prompt Area */
    .prompt-area {
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 8px;
      padding: 16px;
      transition: border-color 0.2s;
    }

    .prompt-area:focus-within {
      border-color: #667eea;
    }

    /* Model Badges Row */
    .badges-row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      align-items: center;
      margin-bottom: 12px;
    }

    .badge {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 6px 10px;
      border-radius: 6px;
      background: #0a0a0a;
      border: 1px solid #2a2a2a;
      cursor: pointer;
      transition: all 0.2s;
    }

    .badge:hover {
      border-color: #667eea;
      background: #151515;
    }

    .badge.active {
      border-color: #10b981;
    }

    .badge-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #10b981;
    }

    .badge-name {
      font-size: 13px;
      font-weight: 600;
      color: #e5e5e5;
    }

    .badge-model {
      font-size: 11px;
      color: #888;
    }

    .badge-remove {
      font-size: 12px;
      color: #666;
      cursor: pointer;
      padding: 0 2px;
      transition: color 0.2s;
    }

    .badge-remove:hover {
      color: #ef4444;
    }

    .add-badge {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 6px 12px;
      border-radius: 6px;
      background: transparent;
      border: 1px dashed #444;
      color: #888;
      cursor: pointer;
      font-size: 13px;
      transition: all 0.2s;
    }

    .add-badge:hover {
      border-color: #667eea;
      color: #667eea;
      background: rgba(102, 126, 234, 0.05);
    }

    .add-badge-icon {
      font-size: 16px;
      font-weight: 300;
    }

    .submit-btn {
      margin-left: auto;
      padding: 8px 20px;
      border-radius: 6px;
      background: #667eea;
      color: white;
      border: none;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }

    .submit-btn:hover:not(:disabled) {
      background: #5568d3;
      transform: translateY(-1px);
    }

    .submit-btn:disabled {
      background: #333;
      color: #666;
      cursor: not-allowed;
    }

    /* Textarea */
    .input-textarea {
      width: 100%;
      min-height: 80px;
      padding: 12px;
      border-radius: 6px;
      border: none;
      background: transparent;
      color: #e5e5e5;
      font-size: 14px;
      font-family: inherit;
      resize: vertical;
      outline: none;
    }

    .input-textarea::placeholder {
      color: #666;
    }

    /* Footer Info */
    .footer-info {
      display: flex;
      justify-content: space-between;
      margin-top: 12px;
      font-size: 12px;
      color: #666;
    }

    /* Dialog Modal */
    .modal-overlay {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.8);
      display: none;
      justify-content: center;
      align-items: center;
      z-index: 1000;
    }

    .modal-overlay.active {
      display: flex;
    }

    .modal {
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 12px;
      width: 90%;
      max-width: 600px;
      max-height: 80vh;
      overflow: hidden;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.8);
    }

    .modal-header {
      padding: 16px 20px;
      border-bottom: 1px solid #2a2a2a;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .modal-title {
      font-size: 16px;
      font-weight: 600;
    }

    .modal-counter {
      font-size: 13px;
      color: #888;
    }

    .modal-body {
      padding: 20px;
      overflow-y: auto;
      max-height: 60vh;
    }

    .section-title {
      font-size: 13px;
      font-weight: 600;
      color: #888;
      margin-bottom: 12px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .model-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin-bottom: 20px;
    }

    .model-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px;
      border: 1px solid #2a2a2a;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .model-item:hover {
      background: #222;
      border-color: #667eea;
    }

    .model-item-name {
      font-size: 14px;
      font-weight: 500;
    }

    .model-item-provider {
      font-size: 12px;
      color: #888;
    }

    .model-item-add {
      color: #667eea;
      font-size: 12px;
      font-weight: 600;
    }

    .search-input {
      width: 100%;
      padding: 10px 14px;
      border-radius: 8px;
      border: 1px solid #2a2a2a;
      background: #0a0a0a;
      color: #e5e5e5;
      font-size: 14px;
      outline: none;
      margin-bottom: 16px;
    }

    .search-input:focus {
      border-color: #667eea;
    }

    .search-input::placeholder {
      color: #666;
    }

    .empty-state {
      text-align: center;
      padding: 40px 20px;
      color: #666;
    }

    .empty-state-icon {
      font-size: 48px;
      margin-bottom: 12px;
    }

    .max-warning {
      text-align: center;
      padding: 16px;
      color: #f59e0b;
      font-size: 14px;
    }

    .modal-footer {
      padding: 12px 20px;
      border-top: 1px solid #2a2a2a;
      display: flex;
      justify-content: space-between;
      font-size: 12px;
      color: #666;
    }

    /* Status indicators */
    .status-bar {
      display: flex;
      gap: 16px;
      padding: 12px 24px;
      border-top: 1px solid #1a1a1a;
      font-size: 12px;
      color: #666;
    }

    .status-item {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .status-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
    }

    .status-dot.success {
      background: #10b981;
    }

    .status-dot.warning {
      background: #f59e0b;
    }
  </style>
</head>
<body>
  <div class="container">
    <!-- Header -->
    <div class="header">
      <div class="logo">Agents R</div>
      <div class="tagline">Multi-Model AI Collaboration System</div>
    </div>

    <!-- Main Content -->
    <div class="content">
      <!-- Prompt Area -->
      <div class="prompt-area" id="promptArea">
        <!-- Badges Row -->
        <div class="badges-row" id="badgesRow">
          <!-- Badges will be injected here -->
          <div class="empty-state" id="emptyState" style="padding: 20px 0;">
            <div class="empty-state-icon"></div>
            <div style="font-size: 14px; margin-bottom: 8px;">No models added yet</div>
            <div style="font-size: 12px; color: #666;">Click "+ Add Model" to get started</div>
          </div>

          <!-- Add Button -->
          <button class="add-badge" id="addBtn" onclick="openModal()">
            <span class="add-badge-icon">+</span>
            <span>Add Model</span>
          </button>

          <!-- Spacer -->
          <div style="flex: 1;"></div>

          <!-- Submit Button -->
          <button class="submit-btn" id="submitBtn" disabled>
            البدء
          </button>
        </div>

        <!-- Textarea -->
        <textarea 
          class="input-textarea" 
          id="inputTextarea"
          placeholder="Add models first to start collaborating..."
          disabled
        ></textarea>

        <!-- Footer Info -->
        <div class="footer-info">
          <span id="modelCount">0 models active</span>
          <span>Enter to submit · Shift+Enter for new line</span>
        </div>
      </div>
    </div>

    <!-- Status Bar -->
    <div class="status-bar">
      <div class="status-item">
        <div class="status-dot success"></div>
        <span>Connected</span>
      </div>
      <div class="status-item">
        <div class="status-dot success"></div>
        <span>3 LSP</span>
      </div>
      <div class="status-item">
        <div class="status-dot warning"></div>
        <span>2 MCP</span>
      </div>
    </div>
  </div>

  <!-- Modal Dialog -->
  <div class="modal-overlay" id="modalOverlay" onclick="closeModal(event)">
    <div class="modal" onclick="event.stopPropagation()">
      <div class="modal-header">
        <div class="modal-title">Multi-Model Setup</div>
        <div class="modal-counter" id="modalCounter">0/3</div>
      </div>
      <div class="modal-body">
        <!-- Active Models Section -->
        <div id="activeModelsSection" style="display: none;">
          <div class="section-title">Active Models</div>
          <div class="model-list" id="activeModelsList"></div>
        </div>

        <!-- Add Models Section -->
        <div id="addModelsSection">
          <div class="section-title">Add Model</div>
          <input 
            type="text" 
            class="search-input" 
            id="searchInput"
            placeholder="Search models..."
            oninput="filterModels(this.value)"
          >
          <div class="model-list" id="availableModelsList"></div>
        </div>

        <!-- Max Warning -->
        <div id="maxWarning" class="max-warning" style="display: none;">
          ⚠ Maximum 3 models reached
        </div>
      </div>
      <div class="modal-footer">
        <span>Click model to add · Esc to close</span>
        <span id="modalFooterHint"></span>
      </div>
    </div>
  </div>

  <script>
    // State
    let models = [];
    const MAX_MODELS = 3;

    // Available models data
    const allModels = [
      { providerID: 'anthropic', providerName: 'Anthropic', modelID: 'claude-sonnet-4-5', modelName: 'Claude Sonnet 4.5' },
      { providerID: 'anthropic', providerName: 'Anthropic', modelID: 'claude-opus-4', modelName: 'Claude Opus 4' },
      { providerID: 'anthropic', providerName: 'Anthropic', modelID: 'claude-haiku-4-5', modelName: 'Claude Haiku 4.5' },
      { providerID: 'openai', providerName: 'OpenAI', modelID: 'gpt-4.1', modelName: 'GPT-4.1' },
      { providerID: 'openai', providerName: 'OpenAI', modelID: 'gpt-4.1-mini', modelName: 'GPT-4.1 Mini' },
      { providerID: 'google', providerName: 'Google', modelID: 'gemini-2.5-pro', modelName: 'Gemini 2.5 Pro' },
      { providerID: 'google', providerName: 'Google', modelID: 'gemini-2.5-flash', modelName: 'Gemini 2.5 Flash' },
      { providerID: 'xai', providerName: 'xAI', modelID: 'grok-4', modelName: 'Grok 4' },
    ];

    // Render badges
    function renderBadges() {
      const badgesRow = document.getElementById('badgesRow');
      const emptyState = document.getElementById('emptyState');
      const addBtn = document.getElementById('addBtn');
      const submitBtn = document.getElementById('submitBtn');
      const inputTextarea = document.getElementById('inputTextarea');
      const modelCount = document.getElementById('modelCount');

      // Clear existing badges (keep addBtn, submitBtn, emptyState)
      const existingBadges = badgesRow.querySelectorAll('.badge');
      existingBadges.forEach(b => b.remove());

      if (models.length === 0) {
        emptyState.style.display = 'block';
        addBtn.style.display = 'flex';
        submitBtn.disabled = true;
        inputTextarea.disabled = true;
        inputTextarea.placeholder = 'Add models first to start collaborating...';
      } else {
        emptyState.style.display = 'none';
        addBtn.style.display = models.length >= MAX_MODELS ? 'none' : 'flex';
        submitBtn.disabled = !inputTextarea.value.trim();
        inputTextarea.disabled = false;
        inputTextarea.placeholder = 'Ask anything...';

        // Insert badges before addBtn
        models.forEach((model, index) => {
          const badge = document.createElement('div');
          badge.className = 'badge active';
          badge.innerHTML = `
            <div class="badge-dot"></div>
            <span class="badge-name">${model.name}</span>
            <span class="badge-model">${model.modelID}</span>
            <span class="badge-remove" onclick="removeModel(${index})">✕</span>
          `;
          badgesRow.insertBefore(badge, addBtn);
        });
      }

      modelCount.textContent = `${models.length} model${models.length !== 1 ? 's' : ''} active`;
    }

    // Add model
    function addModel(model) {
      if (models.length >= MAX_MODELS) return;
      
      const name = `Agent ${models.length + 1}`;
      models.push({
        id: `agent_${Date.now()}`,
        name,
        providerID: model.providerID,
        modelID: model.modelID,
      });
      
      renderBadges();
      updateModal();
    }

    // Remove model
    function removeModel(index) {
      models.splice(index, 1);
      renderBadges();
      updateModal();
    }

    // Modal functions
    function openModal() {
      document.getElementById('modalOverlay').classList.add('active');
      updateModal();
      renderAvailableModels();
    }

    function closeModal(event) {
      if (event.target === document.getElementById('modalOverlay')) {
        document.getElementById('modalOverlay').classList.remove('active');
      }
    }

    function updateModal() {
      const modalCounter = document.getElementById('modalCounter');
      const activeModelsSection = document.getElementById('activeModelsSection');
      const addModelsSection = document.getElementById('addModelsSection');
      const maxWarning = document.getElementById('maxWarning');
      const modalFooterHint = document.getElementById('modalFooterHint');

      modalCounter.textContent = `${models.length}/${MAX_MODELS}`;

      if (models.length > 0) {
        activeModelsSection.style.display = 'block';
        renderActiveModels();
      } else {
        activeModelsSection.style.display = 'none';
      }

      if (models.length >= MAX_MODELS) {
        addModelsSection.style.display = 'none';
        maxWarning.style.display = 'block';
      } else {
        addModelsSection.style.display = 'block';
        maxWarning.style.display = 'none';
      }

      modalFooterHint.textContent = models.length > 0 ? 'Click ✕ to remove' : '';
    }

    function renderActiveModels() {
      const container = document.getElementById('activeModelsList');
      container.innerHTML = '';

      models.forEach((model, index) => {
        const item = document.createElement('div');
        item.className = 'model-item';
        item.innerHTML = `
          <div>
            <div class="model-item-name">${model.name}</div>
            <div class="model-item-provider">${model.providerID}/${model.modelID}</div>
          </div>
          <span class="badge-remove" onclick="removeModel(${index}); updateModal();" style="color: #ef4444;">✕</span>
        `;
        container.appendChild(item);
      });
    }

    function renderAvailableModels(filter = '') {
      const container = document.getElementById('availableModelsList');
      container.innerHTML = '';

      const addedKeys = new Set(models.map(m => `${m.providerID}/${m.modelID}`));
      const filtered = allModels.filter(m => {
        if (addedKeys.has(`${m.providerID}/${m.modelID}`)) return false;
        if (filter) {
          const search = filter.toLowerCase();
          return m.modelName.toLowerCase().includes(search) || 
                 m.providerName.toLowerCase().includes(search);
        }
        return true;
      });

      if (filtered.length === 0) {
        container.innerHTML = '<div class="empty-state"><div style="font-size: 12px;">No models found</div></div>';
        return;
      }

      filtered.forEach(model => {
        const item = document.createElement('div');
        item.className = 'model-item';
        item.onclick = () => {
          addModel(model);
          if (models.length < MAX_MODELS) {
            renderAvailableModels(document.getElementById('searchInput').value);
          } else {
            updateModal();
          }
        };
        item.innerHTML = `
          <div>
            <div class="model-item-name">${model.modelName}</div>
            <div class="model-item-provider">${model.providerName}</div>
          </div>
          <span class="model-item-add">+ Add</span>
        `;
        container.appendChild(item);
      });
    }

    function filterModels(query) {
      renderAvailableModels(query);
    }

    // Input handling
    document.getElementById('inputTextarea').addEventListener('input', function() {
      const submitBtn = document.getElementById('submitBtn');
      submitBtn.disabled = !this.value.trim() || models.length === 0;
    });

    document.getElementById('inputTextarea').addEventListener('keydown', function(e) {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        if (models.length > 0 && this.value.trim()) {
          alert(`Sending to ${models.length} model(s):\n${models.map(m => m.name).join(', ')}\n\nPrompt: ${this.value}`);
          this.value = '';
          document.getElementById('submitBtn').disabled = true;
        }
      }
    });

    // Keyboard shortcut
    document.addEventListener('keydown', function(e) {
      if (e.key === 'Escape') {
        document.getElementById('modalOverlay').classList.remove('active');
      }
    });

    // Initial render
    renderBadges();
  </script>
</body>
</html>
